server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve config.json
    location = /config.json {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
        add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
        try_files $uri =404;
    }

    # Serve .well-known for Element Call — must include MSC4143 rtc_foci
    # IMPORTANT: livekit_service_url MUST point to the lk-jwt-service (which issues
    # JWT tokens), NOT the LiveKit server directly. The JWT service then connects
    # clients to the LiveKit server via WebSocket. Using the wrong URL here causes
    # "Sorry, an error occurred" when starting calls on mobile.
    location /.well-known/matrix/client {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
        add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
        default_type application/json;
        return 200 '{
            "m.homeserver": {
                "base_url": "https://synapsechat.up.railway.app/"
            },
            "io.element.e2ee": {
                "default": true
            },
            "org.matrix.msc4143.rtc_foci": [
                {
                    "type": "livekit",
                    "livekit_service_url": "https://lk-jwt-service-production.up.railway.app"
                }
            ],
            "io.element.call": {
                "url": "https://element-call-production-0707.up.railway.app",
                "participant_limit": 999,
                "e2ee": true
            }
        }';
    }

    # SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}