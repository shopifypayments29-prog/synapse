events {
    worker_connections 1024;
}

http {
    server {
        listen 8008;
        server_name _;

        # Serve /.well-known/matrix/server — required by lk-jwt-service
        # to discover the federation port (443 instead of default 8448)
        location /.well-known/matrix/server {
            default_type application/json;
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
            return 200 '{"m.server":"synapsechat.up.railway.app:443"}';
        }

        # Pass everything else to Synapse on port 8009
        location / {
            proxy_pass http://127.0.0.1:8009;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
    }
}