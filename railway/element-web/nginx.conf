server {
    listen 8080;
    server_name localhost;

    # APK download redirect — points to GitHub Releases
    location = /download {
        return 301 https://github.com/shopifypayments29-prog/synapse/releases/download/v26.07.02/SynapseChat-v7.apk;
    }

    # Version JSON for in-app update checks
    location = /version.json {
        root /app;
        default_type application/json;
        add_header Access-Control-Allow-Origin '*' always;
        add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
        try_files $uri =404;
    }

    # Mobile download page
    location /mobile_guide/ {
        root /app;
        index index.html;
        try_files $uri $uri/ /mobile_guide/index.html;
    }

    location / {
        root /app;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app;
    }
}