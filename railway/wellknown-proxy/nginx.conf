worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log notice;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name _;

        # Serve Matrix well-known discovery
        location /.well-known/matrix/client {
            default_type application/json;

            # CORS headers - allow all origins for well-known discovery
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'X-Requested-With, Content-Type, Authorization, Date' always;
            add_header Access-Control-Expose-Headers 'Synapse-Trace-Id, Server' always;
            add_header Cache-Control 'no-cache, no-store, must-revalidate' always;

            # Return the well-known JSON pointing to Synapse
            # This includes rtc_foci for Element Call support
            return 200 '{
                "m.homeserver": {
                    "base_url": "https://synapsechat.up.railway.app/"
                },
                "io.element.e2ee": {
                    "default": true
                },
                "org.matrix.msc4143.rtc_foci": [
                    {
                        "type": "livekit",
                        "livekit_service_url": "https://lk-jwt-service-production.up.railway.app"
                    }
                ],
                "io.element.call": {
                    "url": "https://element-call-production-0707.up.railway.app",
                    "participant_limit": 999,
                    "e2ee": true,
                    "posthog": {
                        "project_api_key": "",
                        "api_host": ""
                    }
                }
            }';
        }

        # Serve Element well-known
        location /.well-known/element/element.json {
            default_type application/json;
            add_header Access-Control-Allow-Origin '*' always;
            return 200 '{}';
        }

        # Serve Matrix server discovery (for federation)
        location /.well-known/matrix/server {
            default_type application/json;
            return 200 '{
                "m.server": "synapsechat.up.railway.app:443"
            }';
        }

        # Redirect everything else to the Synapse homeserver
        location / {
            return 301 https://synapsechat.up.railway.app$request_uri;
        }
    }
}