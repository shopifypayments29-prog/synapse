# LiveKit Server Configuration for SynapseChat
# Development mode - voice/video calling

port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 49152
  port_range_end: 49200
  use_external_ip: false

redis:
  address: synapsechat-redis:6379

keys:
  devkey: devsecret

logging:
  level: info

room:
  auto_create: true

turn:
  enabled: false