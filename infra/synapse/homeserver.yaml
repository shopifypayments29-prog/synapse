# SynapseChat Synapse Homeserver Configuration
# Single-server mode (federation disabled for initial launch)

# ─── Server ───
server_name: "synapse.chat"
pid_file: /data/homeserver.pid
report_stats: false
log_config: "/data/synapse.chat.log.config"
media_store_path: /data/media_store
uploads_path: /data/uploads
public_baseurl: "https://synapse.chat"

# ─── Listeners ───
listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

# ─── Single-Server Mode ───
federation_enabled: false

# ─── Database (PostgreSQL) ───
database:
  name: psycopg2
  args:
    user: synapsechat
    password: synapsechat_dev_password
    database: synapsechat
    host: synapsechat-postgres
    cp_min: 5
    cp_max: 20

# ─── Redis (for worker replication) ───
redis:
  enabled: true
  host: synapsechat-redis
  port: 6379

# ─── Registration (dev mode: open, no verification) ───
enable_registration: true
enable_registration_without_verification: true

# ─── Rate Limiting ───
rc_login:
  account:
    per_second: 0.17
    burst_count: 3
  address:
    per_second: 0.17
    burst_count: 3
  failed_attempts:
    per_second: 0.17
    burst_count: 3

rc_registration:
  per_second: 0.17
  burst_count: 3

rc_joins:
  local:
    per_second: 0.1
    burst_count: 10
  remote:
    per_second: 0.01
    burst_count: 5

rc_message:
  per_second: 5
  burst_count: 50

rc_invites:
  per_room:
    per_second: 0.2
    burst_count: 10
  per_user:
    per_second: 0.2
    burst_count: 10

# ─── Encryption (E2EE by default) ───
encryption_enabled_by_default_for_room_type: all

# ─── Media ───
max_upload_size: "100M"
max_image_pixels: "128M"
dynamic_thumbnails: true
thumbnail_sizes:
  - width: 32
    height: 32
    method: crop
  - width: 96
    height: 96
    method: crop
  - width: 320
    height: 240
    method: scale
  - width: 640
    height: 480
    method: scale
  - width: 800
    height: 600
    method: scale

# ─── Retention ───
retention:
  enabled: true
  default_policy:
    min_lifetime: 1d
    max_lifetime: 3650d
  allowed_lifetime_min: 1d
  allowed_lifetime_max: 3650d

# ─── Push ───
push:
  enabled: true

# ─── Rooms ───
default_room_version: "10"
auto_join_rooms:
  - "#announcements:synapse.chat"
  - "#welcome:synapse.chat"
autocreate_auto_join_rooms: true
autocreate_auto_join_rooms_federated: false

# ─── Presence ───
presence:
  enabled: true

# ─── User Directory ───
user_directory:
  enabled: true
  search_all_users: true

# ─── Email (placeholder) ───
email:
  smtp_host: "mail.synapse.chat"
  smtp_port: 587
  smtp_user: "noreply@synapse.chat"
  smtp_pass: "CHANGE_ME_IN_PRODUCTION"
  require_transport_security: true
  notif_from: "SynapseChat <noreply@synapse.chat>"
  app_name: "SynapseChat"

# ─── Experimental Features ───
experimental_features:
  msc3266_enabled: true
  msc3664_enabled: true

# ─── Secrets (generated) ───
