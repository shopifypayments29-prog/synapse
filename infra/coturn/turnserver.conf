# coturn TURN Server Configuration for SynapseChat
# Development mode

# Network
listening-port=3478
tls-listening-port=5349
alt-listening-port=0
alt-tls-listening-port=0

# Listening IPs (use host IP in production)
listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=0.0.0.0

# Realm
realm=synapse.chat
server-name=synapse.chat

# TLS (self-signed for dev, proper certs in prod)
# cert=/etc/coturn/certs/cert.pem
# pkey=/etc/coturn/certs/key.pem

# Disable TLS for development
no-tls
no-dtls

# Authentication
# Development: use static credentials
# Production: use TURN REST API with shared secret
user=synapsechat:synapsechat_dev_turn_secret

# Logging
log-stdout
verbose

# Security
fingerprint
lt-cred-mech

# Performance
max-bps=1000000
bps-capacity=0

# Limits
max-allocs-per-user=100
max-allocate-lifetime=3600

# Deny peers (private networks for dev)
no-multicast-peers