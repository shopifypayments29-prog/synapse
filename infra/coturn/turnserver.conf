# coturn TURN Server Configuration for SynapseChat
# Development mode

# Network
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# Realm
realm=synapse.chat
server-name=synapse.chat

# Disable TLS for development (enable in production with proper certs)
no-tls
no-dtls

# Authentication (static credentials for dev)
user=synapsechat:synapsechat_turn_secret

# Logging
log-stdout
verbose

# Security
fingerprint
lt-cred-mech

# Performance
max-bps=1000000

# Limits
max-allocs-per-user=100

# No multicast
no-multicast-peers