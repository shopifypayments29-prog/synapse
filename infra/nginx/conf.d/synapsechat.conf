# Nginx Reverse Proxy Configuration for SynapseChat
# Development mode (HTTP only, add TLS for production)

upstream synapse_backend {
    server synapse:8008;
}

upstream livekit_backend {
    server livekit:7880;
}

server {
    listen 80;
    server_name synapse.chat localhost;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Synapse Client API
    location /_matrix/ {
        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Matrix
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long polling support
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Upload size limit
        client_max_body_size 100M;
    }

    # Synapse Health Check
    location /health {
        proxy_pass http://synapse_backend/health;
    }

    # Synapse Admin API (restrict to localhost in production!)
    location /_synapse/ {
        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # .well-known Matrix discovery
    location /.well-known/matrix/ {
        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    # LiveKit (for voice/video calls)
    location /livekit/ {
        proxy_pass http://livekit_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}