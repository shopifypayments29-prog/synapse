name: SynapseChat Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: synapsechat

jobs:
  # ─── Build Release Docker Images ───
  docker-release:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [synapse, sygnal]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./repos/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.version.outputs.VERSION }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}

  # ─── Build Web Client ───
  web-release:
    name: Build Web Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repos/element-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install and build
        run: |
          yarn install --immutable
          yarn build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: synapsechat-web
          path: repos/element-web/webapp/
          retention-days: 30

  # ─── Build Android APK ───
  android-release:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repos/element-x-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build debug APK
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: synapsechat-android-debug
          path: repos/element-x-android/app/build/outputs/apk/debug/*.apk

  # ─── Create GitHub Release ───
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-release, web-release, android-release]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/synapsechat-web/**/*
            artifacts/synapsechat-android-debug/**/*
          draft: true
          generate_release_notes: true