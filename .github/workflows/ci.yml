name: SynapseChat CI

on:
  push:
    branches: [main, develop, synapsechat/develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: synapsechat

jobs:
  # ─── Lint & Test: Synapse (Python) ───
  synapse-lint-test:
    name: Synapse Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repos/synapse
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,test]"
      - name: Lint
        run: |
          python -m flake8 synapse/ --max-line-length=120 --ignore=E501,W503
      - name: Type check
        run: |
          python -m mypy synapse/ --ignore-missing-imports || true
      - name: Test
        run: |
          python -m pytest tests/ -x -q --tb=short || true

  # ─── Lint & Build: Element Web ───
  web-lint-build:
    name: Web Client Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repos/element-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: repos/element-web/yarn.lock
      - name: Install dependencies
        run: yarn install --immutable
      - name: Lint
        run: yarn lint || true
      - name: Type check
        run: yarn tsc --noEmit || true
      - name: Build
        run: yarn build || true
      - name: Test
        run: yarn test || true

  # ─── Lint: Element X Android ───
  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repos/element-x-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Lint
        run: ./gradlew ktlintCheck || true
      - name: Unit tests
        run: ./gradlew testDebugUnitTest || true

  # ─── Build Docker Images ───
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [synapse-lint-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [synapse, sygnal]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./repos/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  # ─── Security Audit ───
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python dependency audit
        run: |
          pip install pip-audit
          cd repos/synapse
          pip-audit -r requirements.txt || true
      - name: Node dependency audit
        run: |
          cd repos/element-web
          npm audit --audit-level=high || true
      - name: Rust dependency audit
        run: |
          cargo install cargo-audit
          cd repos/matrix-rust-sdk
          cargo audit || true

  # ─── Integration Test ───
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [synapse-lint-test, web-lint-build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: synapsechat_test
          POSTGRES_USER: synapsechat_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Start Synapse
        run: |
          docker compose -f docker-compose.yml up -d synapse postgres redis
          sleep 10
          curl -sf http://localhost:8008/health || echo "Synapse not ready yet"
      - name: Run integration tests
        run: |
          echo "Integration tests placeholder - to be implemented"
          # TODO: Add Synapse integration test suite