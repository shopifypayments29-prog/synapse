server {
    listen 8080;
    server_name localhost;

    # APK download redirect — points to GitHub Releases
    location = /download {
        return 301 https://github.com/shopifypayments29-prog/synapse/releases/download/v26.06.4/SynapseChat-fdroid-arm64-v8a-debug.apk;
    }

    # Mobile download page
    location /mobile_guide/ {
        root /app;
        index index.html;
        try_files $uri $uri/ /mobile_guide/index.html;
    }

    location / {
        root /app;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app;
    }
}